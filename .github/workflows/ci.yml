name: CI

# Wave 2 (OPS-1) — a gate that runs on every PR and push so a broken build or a
# failing test can't ship unnoticed (which is how the broken-table features and
# the 30 type errors reached "done" in the first place).
#
# BLOCKING today: install, unit tests, production build — all green as of
# 2026-07-05, so this gate starts green.
#
# INFORMATIONAL today: lint (~70 errors) and typecheck (~24 errors) run but do
# NOT fail the build yet — they are a pre-existing backlog (OPS-2 for the `any`
# cleanup; the type errors also depend on the Deals/Messages tables built in
# Wave 4). Their counts are visible in the run so new regressions surface and
# the backlog can trend to zero. Flip `continue-on-error` to false (or delete
# it) once each reaches zero to make them blocking.

on:
  push:
    branches: [main, develop, "feat/**"]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ---- Blocking gates (must pass) ----
      - name: Unit tests
        run: npm run test:ci

      - name: Production build
        run: npm run build

      # ---- Informational (backlog — see BACKEND-GAP-ANALYSIS.md OPS-2) ----
      - name: Typecheck (informational)
        run: npm run typecheck
        continue-on-error: true

      - name: Lint (informational)
        run: npm run lint
        continue-on-error: true
